            { label: "音乐启蒙", type: "MUSIC" },
            { label: "精神支柱", type: "BALANCED" }
        ]},
        { text: "如果让你用一句话形容张杰，你会说？", options: [
            { label: "华语Live王", type: "LIVE" },
            { label: "温柔大北斗", type: "LOYALTY" },
            { label: "唱跳全能", type: "STAGE" },
            { label: "我的青春", type: "HISTORY" },
            { label: "永远的神", type: "NEW_MEDIA" }
        ]},
        // 趣味假设
        { text: "如果张杰有一天来你的城市开见面会，你会？", options: [
            { label: "请假也要去", type: "LIVE" },
            { label: "想办法搞到票", type: "ACTIVE" },
            { label: "看缘分", type: "QUIET" },
            { label: "组织粉丝一起去", type: "ACTIVE" },
            { label: "带上自制应援物", type: "TOUR" }
        ]},
        { text: "你希望张杰未来尝试什么新风格？", options: [
            { label: "摇滚", type: "MUSIC" },
            { label: "R&B", type: "MUSIC" },
            { label: "电子舞曲", type: "STAGE" },
            { label: "他做什么我都爱", type: "LOYALTY" },
            { label: "尝试民谣", type: "BALANCED" }
        ]},
        { text: "你觉得张杰最帅的瞬间是？", options: [
            { label: "飙高音的时候", type: "VOCAL" },
            { label: "跳舞的wave", type: "STAGE" },
            { label: "对星星们说“谢谢”", type: "ACTIVE" },
            { label: "舞台上大汗淋漓", type: "LIVE" },
            { label: "笑着和粉丝互动", type: "NEW_MEDIA" }
        ]},
        { text: "你平时怎么称呼张杰？", options: [
            { label: "杰哥", type: "BALANCED" },
            { label: "大北斗", type: "LOYALTY" },
            { label: "星星的太阳", type: "QUIET" },
            { label: "直接叫张杰", type: "NEW" },
            { label: "打工杰（开玩笑）", type: "NEW_MEDIA" }
        ]},
        { text: "如果张杰邀请你上台合唱，你会选哪首歌？", options: [
            { label: "《天下》", type: "MUSIC" },
            { label: "《这，就是爱》", type: "VOCAL" },
            { label: "《最美的太阳》", type: "LOYALTY" },
            { label: "《逆战》", type: "STAGE" },
            { label: "《星星》", type: "QUIET" }
        ]},
        { text: "你最喜欢张杰的哪个舞台造型？", options: [
            { label: "古风长袍", type: "MUSIC" },
            { label: "西装绅士", type: "VOCAL" },
            { label: "运动休闲", type: "STAGE" },
            { label: "炫酷皮衣", type: "LIVE" },
            { label: "背带裤可爱风", type: "BALANCED" }
        ]}
    ];

    const QUESTIONS_PER_TEST = 12;
    let currentQuestions = [];
    let currentIndex = 0;
    let dimensionScores = {
        VOCAL:0, STAGE:0, LOYALTY:0, ACTIVE:0, MUSIC:0,
        LIVE:0, HISTORY:0, BALANCED:0, NEW:0, QUIET:0,
        TOUR:0, NEW_MEDIA:0
    };
    let quizFinished = false;

    const dynamicDiv = document.getElementById('dynamicContent');
    const progressArea = document.getElementById('progressArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const progressFill = document.getElementById('progressFill');

    function getRandomQuestions(n) {
        let shuffled = [...FULL_QUESTION_SET];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, n);
    }

    function initDimensionScores() {
        dimensionScores = {
            VOCAL:0, STAGE:0, LOYALTY:0, ACTIVE:0, MUSIC:0,
            LIVE:0, HISTORY:0, BALANCED:0, NEW:0, QUIET:0,
            TOUR:0, NEW_MEDIA:0
        };
    }

    function updateProgress() {
        if (quizFinished) return;
        const percent = ((currentIndex) / currentQuestions.length) * 100;
        progressFill.style.width = percent + '%';
        questionCounterSpan.innerText = `第${currentIndex+1} / ${currentQuestions.length}题`;
    }

    function getDominantPersonality() {
        // 特殊类型优先判定（阈值可微调）
        if (dimensionScores.NEW >= 4) return PERSONALITY_TYPES.NEW_STAR;
        if (dimensionScores.HISTORY >= 5) return PERSONALITY_TYPES.FANS_CLUB;
        if (dimensionScores.LIVE >= 5) return PERSONALITY_TYPES.LIVE_KING;
        if (dimensionScores.TOUR >= 4) return PERSONALITY_TYPES.TOUR_FAN;
        if (dimensionScores.NEW_MEDIA >= 4) return PERSONALITY_TYPES.NEW_MEDIA_FAN;
        
        let maxScore = 0;
        let primaryType = null;
        const primaryKeys = ['VOCAL', 'STAGE', 'LOYALTY', 'ACTIVE', 'MUSIC'];
        for (let key of primaryKeys) {
            if (dimensionScores[key] > maxScore) {
                maxScore = dimensionScores[key];
                primaryType = key;
            }
        }
        if (primaryType === 'VOCAL') return PERSONALITY_TYPES.VOCAL_LOVER;
        if (primaryType === 'STAGE') return PERSONALITY_TYPES.STAGE_MANIAC;
        if (primaryType === 'LOYALTY') return PERSONALITY_TYPES.IRON_FAN;
        if (primaryType === 'ACTIVE') return PERSONALITY_TYPES.ALL_ROUNDER;
        if (primaryType === 'MUSIC') return PERSONALITY_TYPES.MUSIC_LOVER;
        return PERSONALITY_TYPES.QUIET_STAR;
    }

    function renderQuestion() {
        if (currentIndex >= currentQuestions.length) {
            finishQuiz();
            return;
        }
        const q = currentQuestions[currentIndex];
        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D', 'E'];
        q.options.forEach((opt, idx) => {
            optionsHtml += `
                <div class="option-btn" data-type="${opt.type}">
                    <span class="letter">${letters[idx]}</span>  ${opt.label}
                </div>
            `;
        });

        const html = `
            <div class="question-area">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsList">
                    ${optionsHtml}
                </div>
            </div>
        `;
        dynamicDiv.innerHTML = html;

        const optionBtns = document.querySelectorAll('.option-btn');
        optionBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const typeKey = btn.getAttribute('data-type');
                if (dimensionScores[typeKey] !== undefined) dimensionScores[typeKey]++;
                currentIndex++;
                updateProgress();
                if (currentIndex < currentQuestions.length) renderQuestion();
                else finishQuiz();
            });
        });
    }

    function finishQuiz() {
        quizFinished = true;
        progressArea.style.display = 'none';
        const result = getDominantPersonality();

        const resultHtml = `
            <div class="result-card">
                <div style="font-size: 48px;">🌟</div>
                <div class="result-title">${result.name}</div>
                <div class="result-desc">
                    🎤 你的星星人格 · 专属头衔<br><br>
                    ${result.desc}<br><br>
                    💙 “只要张杰唱下去，星星就永远亮着。”
                </div>
                <button class="restart-btn" id="restartBtn">✨ 再测一次 ✨</button>
                <div class="footer">⭐ 本测试纯属娱乐 · 致敬每一位星星 ⭐</div>
            </div>
        `;
        dynamicDiv.innerHTML = resultHtml;
        const restartBtn = document.getElementById('restartBtn');
        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                currentQuestions = getRandomQuestions(QUESTIONS_PER_TEST);
                currentIndex = 0;
                initDimensionScores();
                quizFinished = false;
                progressArea.style.display = 'block';
                updateProgress();
                renderQuestion();
            });
        }
    }

    function initQuiz() {
        currentQuestions = getRandomQuestions(QUESTIONS_PER_TEST);
        currentIndex = 0;
        initDimensionScores();
        quizFinished = false;
        progressArea.style.display = 'block';
        updateProgress();
        renderQuestion();
    }

    initQuiz();
</script>
</body>
</html>
